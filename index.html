<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>体重管理</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="体重管理">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --text: #1a1d23;
    --text-sub: #6b7280;
    --accent: #2563eb;
    --accent-sub: #dbeafe;
    --danger: #dc2626;
    --border: #e5e7eb;
    --success: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101317;
      --card-bg: #1a1e24;
      --text: #f0f1f3;
      --text-sub: #9aa2ad;
      --accent: #5b9dff;
      --accent-sub: #1e3a5f;
      --danger: #f87171;
      --border: #2a2f37;
      --success: #4ade80;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: calc(64px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
  }
  main.tab {
    flex: 1;
    padding: 16px 16px 24px;
  }
  main.tab[hidden] { display: none; }
  h1 { font-size: 20px; margin: 4px 0 16px; }
  h2 { font-size: 15px; margin: 0 0 10px; color: var(--text-sub); font-weight: 600; }
  .banner {
    background: var(--accent-sub);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .banner.warn { background: #fee2e2; color: #991b1b; }
  @media (prefers-color-scheme: dark) {
    .banner.warn { background: #4c1d1d; color: #fca5a5; }
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .target-kcal {
    font-size: 40px;
    font-weight: 700;
    line-height: 1.1;
  }
  .target-macros {
    color: var(--text-sub);
    font-size: 14px;
    margin-top: 6px;
  }
  .row { display: flex; gap: 8px; align-items: center; }
  .row + .row { margin-top: 10px; }
  label.field-label {
    font-size: 12px;
    color: var(--text-sub);
    display: block;
    margin-bottom: 4px;
  }
  input[type=text], input[type=number] {
    width: 100%;
    font-size: 16px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
  }
  .field { flex: 1; min-width: 0; }
  .field-narrow { flex: 0 0 76px; }
  button {
    font-size: 15px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
  }
  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  button.danger { background: var(--danger); }
  button:active { opacity: 0.75; }
  .pfc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .trend-line {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: 6px;
  }
  .remaining-box {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .remaining-box .value { font-size: 22px; font-weight: 700; }
  .remaining-box .sub { font-size: 12px; color: var(--text-sub); }
  nav#tabbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav#tabbar button {
    flex: 1;
    background: none;
    color: var(--text-sub);
    border-radius: 0;
    padding: 12px 0 10px;
    font-size: 12px;
    font-weight: 500;
  }
  nav#tabbar button.active { color: var(--accent); font-weight: 700; }
  .save-msg {
    font-size: 12px;
    color: var(--success);
    margin-top: 6px;
    min-height: 16px;
  }
  .error-msg {
    font-size: 12px;
    color: var(--danger);
    margin-top: 6px;
    min-height: 16px;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay[hidden] { display: none; }
  .modal {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    max-width: 400px;
    width: 100%;
  }
  .modal h3 { margin-top: 0; }
  .modal-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .modal-row:last-child { border-bottom: none; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions button { flex: 1; }
  .period-switch {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .period-switch button {
    flex: 1;
    background: var(--bg);
    color: var(--text-sub);
    border: 1px solid var(--border);
    padding: 8px 0;
    font-size: 13px;
  }
  .period-switch button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .chart-svg { width: 100%; height: auto; display: block; }
  .chart-empty { color: var(--text-sub); font-size: 14px; text-align: center; padding: 24px 0; }
  .chart-tooltip { font-size: 12px; color: var(--text-sub); text-align: center; min-height: 16px; margin-top: 4px; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .stat-box .stat-value { font-size: 20px; font-weight: 700; }
  .stat-box .stat-label { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .settings-field { margin-bottom: 14px; }
  .settings-field label.field-label { margin-bottom: 6px; }
  .day-multiplier-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .day-multiplier-grid .dm-item { text-align: center; }
  .day-multiplier-grid label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
  .day-multiplier-grid input { padding: 8px 4px; text-align: center; font-size: 14px; }
  textarea#import-textarea {
    width: 100%;
    min-height: 120px;
    font-size: 14px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-family: monospace;
  }
  .button-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .button-row button { flex: 1; min-width: 120px; }
</style>
</head>
<body>
<div id="app">
  <main class="tab" id="tab-today">
    <div id="today-banner-area"></div>
    <h1 id="today-date-heading">-</h1>

    <div class="card">
      <h2>今日の目標</h2>
      <div id="today-target-body">
        <div class="target-kcal" id="today-target-kcal">--</div>
        <div class="target-macros" id="today-target-macros">-</div>
      </div>
      <div class="trend-line" id="today-trend-line"></div>
      <div class="row" style="margin-top:10px;">
        <button class="secondary" id="override-toggle-btn" type="button" hidden>目標を手動調整</button>
        <button class="secondary" id="override-reset-btn" type="button" hidden>自動計算に戻す</button>
      </div>
      <div id="override-form" hidden style="margin-top:10px;">
        <div class="row">
          <div class="field">
            <label class="field-label" for="override-kcal-input">週の目標平均kcal</label>
            <input type="text" inputmode="numeric" id="override-kcal-input">
          </div>
          <button id="override-save-btn" type="button">適用</button>
        </div>
        <div class="row">
          <button class="secondary" id="override-cancel-btn" type="button">キャンセル</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>今週の残り</h2>
      <div class="remaining-box">
        <div>
          <div class="value" id="remaining-per-day">--</div>
          <div class="sub" id="remaining-detail">データ不足</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>体重入力</h2>
      <div class="row">
        <div class="field">
          <label class="field-label" for="weight-input">体重 (kg)</label>
          <input type="text" inputmode="decimal" id="weight-input" placeholder="78.6">
        </div>
        <button id="weight-save-btn">保存</button>
      </div>
      <div class="error-msg" id="weight-error"></div>
      <div class="save-msg" id="weight-saved-msg"></div>
    </div>

    <div class="card">
      <h2>摂取記録(Claude算出値)</h2>
      <div class="pfc-grid">
        <div class="field">
          <label class="field-label" for="intake-kcal-input">kcal</label>
          <input type="text" inputmode="numeric" id="intake-kcal-input" placeholder="1850">
        </div>
        <div class="field">
          <label class="field-label" for="intake-protein-input">P (g)</label>
          <input type="text" inputmode="numeric" id="intake-protein-input" placeholder="130">
        </div>
        <div class="field">
          <label class="field-label" for="intake-fat-input">F (g)</label>
          <input type="text" inputmode="numeric" id="intake-fat-input" placeholder="58">
        </div>
        <div class="field">
          <label class="field-label" for="intake-carb-input">C (g)</label>
          <input type="text" inputmode="numeric" id="intake-carb-input" placeholder="195">
        </div>
      </div>
      <div class="row" style="margin-top:10px; justify-content:flex-end;">
        <button id="intake-save-btn">保存</button>
      </div>
      <div class="error-msg" id="intake-error"></div>
      <div class="save-msg" id="intake-saved-msg"></div>
      <div class="trend-line">※あすけんスクショをClaudeチャットに渡して算出した値を転記</div>
    </div>
  </main>

  <main class="tab" id="tab-chart" hidden>
    <h1>グラフ</h1>

    <div class="card">
      <h2>体重</h2>
      <div class="period-switch" id="weight-period-switch">
        <button data-period="30" class="active">1ヶ月</button>
        <button data-period="90">3ヶ月</button>
        <button data-period="0">全期間</button>
      </div>
      <div id="weight-chart-container"></div>
      <div class="chart-tooltip" id="weight-chart-tooltip"></div>
    </div>

    <div class="card">
      <h2>TDEE推移(週次)</h2>
      <div id="tdee-chart-container"></div>
    </div>

    <div class="card">
      <h2>統計サマリ</h2>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="stat-pace">--</div>
          <div class="stat-label">直近4週の平均ペース</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-eta">--</div>
          <div class="stat-label">目標到達予測日</div>
        </div>
      </div>
    </div>
  </main>

  <main class="tab" id="tab-settings" hidden>
    <h1>設定</h1>

    <div class="card">
      <h2>目標</h2>
      <div class="settings-field">
        <label class="field-label" for="cfg-goal-weight">目標体重 (kg)</label>
        <input type="text" inputmode="decimal" id="cfg-goal-weight">
      </div>
      <div class="settings-field">
        <label class="field-label" for="cfg-loss-rate">週次ペース (%)</label>
        <input type="text" inputmode="decimal" id="cfg-loss-rate">
      </div>
      <div class="settings-field">
        <label class="field-label" for="cfg-protein-per-kg">タンパク質 (g/kg)</label>
        <input type="text" inputmode="decimal" id="cfg-protein-per-kg">
      </div>
      <div class="settings-field">
        <label class="field-label" for="cfg-fat-ratio">脂質比率 (残カロリーに占める割合、0〜1)</label>
        <input type="text" inputmode="decimal" id="cfg-fat-ratio">
      </div>
      <div class="settings-field">
        <label class="field-label">曜日別配分倍率(週平均が概ね1.0になるように)</label>
        <div class="day-multiplier-grid">
          <div class="dm-item"><label for="cfg-dm-mon">月</label><input type="text" inputmode="decimal" id="cfg-dm-mon"></div>
          <div class="dm-item"><label for="cfg-dm-tue">火</label><input type="text" inputmode="decimal" id="cfg-dm-tue"></div>
          <div class="dm-item"><label for="cfg-dm-wed">水</label><input type="text" inputmode="decimal" id="cfg-dm-wed"></div>
          <div class="dm-item"><label for="cfg-dm-thu">木</label><input type="text" inputmode="decimal" id="cfg-dm-thu"></div>
          <div class="dm-item"><label for="cfg-dm-fri">金</label><input type="text" inputmode="decimal" id="cfg-dm-fri"></div>
          <div class="dm-item"><label for="cfg-dm-sat">土</label><input type="text" inputmode="decimal" id="cfg-dm-sat"></div>
          <div class="dm-item"><label for="cfg-dm-sun">日</label><input type="text" inputmode="decimal" id="cfg-dm-sun"></div>
        </div>
      </div>
      <div class="row" style="justify-content:flex-end;">
        <button id="cfg-save-btn" type="button">保存</button>
      </div>
      <div class="save-msg" id="cfg-saved-msg"></div>
    </div>

    <div class="card" id="backup-banner-card" hidden>
      <div class="banner warn" id="backup-banner-text"></div>
    </div>

    <div class="card">
      <h2>バックアップ</h2>
      <p style="color:var(--text-sub); font-size:13px; margin-top:0;">全データ(設定・記録・週次計算結果)をJSONとして書き出します。</p>
      <div class="button-row">
        <button class="secondary" id="export-clipboard-btn" type="button">クリップボードにコピー</button>
        <button class="secondary" id="export-download-btn" type="button">ファイルをダウンロード</button>
      </div>
      <div class="save-msg" id="export-msg"></div>
    </div>

    <div class="card">
      <h2>復元(インポート)</h2>
      <p style="color:var(--text-sub); font-size:13px; margin-top:0;">エクスポートしたJSONを貼り付けてください。既存データは上書きされます。</p>
      <textarea id="import-textarea" placeholder="{&quot;wt_config&quot;: ...}"></textarea>
      <div class="row" style="margin-top:10px; justify-content:flex-end;">
        <button id="import-btn" type="button">インポート</button>
      </div>
      <div class="error-msg" id="import-error"></div>
      <div class="save-msg" id="import-msg"></div>
    </div>

    <div class="card">
      <h2>データ削除</h2>
      <p style="color:var(--text-sub); font-size:13px; margin-top:0;">体重・摂取記録・週次計算結果・設定をすべて削除し、初期状態に戻します。</p>
      <button class="danger" id="delete-all-btn" type="button">全データ削除</button>
    </div>
  </main>

  <nav id="tabbar">
    <button data-tab="today" class="active">今日</button>
    <button data-tab="chart">グラフ</button>
    <button data-tab="settings">設定</button>
  </nav>
</div>

<div class="modal-overlay" id="weekly-modal" hidden>
  <div class="modal">
    <h3>週次見直し</h3>
    <div id="weekly-modal-body"></div>
    <div class="modal-actions">
      <button class="secondary" id="weekly-modal-close">閉じる</button>
    </div>
  </div>
</div>

<script>
(() => {
  'use strict';

  // ============================================================
  // アルゴリズム層(純粋関数、DOM非依存)
  // ============================================================

  const DEFAULT_CONFIG = {
    heightCm: 171,
    goalWeightKg: 73.0,
    weeklyLossRatePct: 0.43,
    proteinPerKg: 1.7,
    fatRatio: 0.30,
    kcalPerKgFat: 7200,
    dayMultipliers: { mon: 0.95, tue: 0.95, wed: 0.95, thu: 0.95, fri: 0.95, sat: 1.113, sun: 1.113 },
    emaAlpha: 0.1,
    tdeeWindowDays: 21,
    initialTdee: 2324
  };

  const DAY_KEYS = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
  const DAY_LABELS_JA = { sun: '日', mon: '月', tue: '火', wed: '水', thu: '木', fri: '金', sat: '土' };

  function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

  function todayStr(d) {
    d = d || new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function parseDateStr(s) {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function addDays(dateStr, n) {
    const d = parseDateStr(dateStr);
    d.setDate(d.getDate() + n);
    return todayStr(d);
  }

  function daysBetween(dateStrA, dateStrB) {
    const a = parseDateStr(dateStrA).getTime();
    const b = parseDateStr(dateStrB).getTime();
    return Math.round((b - a) / 86400000);
  }

  function dayOfWeekKey(dateStr) {
    return DAY_KEYS[parseDateStr(dateStr).getDay()];
  }

  function getWeekStart(dateStr) {
    // 週の起点は月曜(ローカルタイム)
    const d = parseDateStr(dateStr);
    const dow = d.getDay(); // 0=sun..6=sat
    const diffToMonday = dow === 0 ? -6 : 1 - dow;
    d.setDate(d.getDate() + diffToMonday);
    return todayStr(d);
  }

  // entries: [{date, weightKg, ...}] 昇順。weightKg==nullの日はスキップ(前回trend保持)
  // 戻り値: [{date, trendWeightKg}] (最初の体重記録以降のみ)
  function calcTrendWeights(entries, alpha) {
    const result = [];
    let trend = null;
    for (const e of entries) {
      if (e.weightKg == null) {
        if (trend != null) result.push({ date: e.date, trendWeightKg: trend });
        continue;
      }
      trend = (trend == null) ? e.weightKg : trend + alpha * (e.weightKg - trend);
      result.push({ date: e.date, trendWeightKg: trend });
    }
    return result;
  }

  function trendMapFrom(trendWeights) {
    const map = {};
    for (const t of trendWeights) map[t.date] = t.trendWeightKg;
    return map;
  }

  // TDEE推定(設計書4.2節)
  // entries: 対象ウィンドウ内の日次レコード(昇順)
  // trendMap: date -> trendWeightKg
  // prevTdee: 直前の推定値(nullなら initialTdee を使用)
  function estimateTdee(entries, trendMap, config, prevTdee) {
    const valid = entries.filter(e => e.weightKg != null && e.intakeKcal != null && trendMap[e.date] != null);
    const prev = (prevTdee != null) ? prevTdee : config.initialTdee;

    if (valid.length < 10) {
      return { tdee: prev, recordedDays: valid.length, guarded: true, reason: 'insufficient-data' };
    }

    const avgIntake = valid.reduce((s, e) => s + e.intakeKcal, 0) / valid.length;
    const first = valid[0];
    const last = valid[valid.length - 1];
    const trendStart = trendMap[first.date];
    const trendEnd = trendMap[last.date];
    const periodDays = Math.max(1, daysBetween(first.date, last.date));
    const deltaTrend = trendEnd - trendStart;

    let est = avgIntake - (deltaTrend * config.kcalPerKgFat / periodDays);

    // ガード: 週次変動を±150kcalにクランプ
    est = clamp(est, prev - 150, prev + 150);
    // ガード: 絶対範囲1600〜3200にクランプ
    est = clamp(est, 1600, 3200);

    return { tdee: Math.round(est), recordedDays: valid.length, guarded: false, avgIntake, deltaTrend, periodDays };
  }

  // 目標摂取カロリー算出(設計書4.3節)
  function calcTargets(trendWeightKg, estimatedTdee, config) {
    const weeklyDeficitKcal = trendWeightKg * (config.weeklyLossRatePct / 100) * config.kcalPerKgFat;
    let targetAvgKcal = estimatedTdee - weeklyDeficitKcal / 7;
    targetAvgKcal = Math.max(1500, targetAvgKcal);

    const targetByDay = {};
    for (const d of DAY_KEYS) {
      targetByDay[d] = Math.round(targetAvgKcal * config.dayMultipliers[d] / 5) * 5;
    }

    return { weeklyDeficitKcal, targetAvgKcal, targetByDay };
  }

  // PFC配分(設計書4.4節)。proteinGは全曜日固定、残りはfatRatioで脂質・炭水化物に配分
  function calcMacrosForKcal(trendWeightKg, kcal, config) {
    const proteinG = Math.round(trendWeightKg * config.proteinPerKg);
    const proteinKcal = proteinG * 4;
    const remainKcal = kcal - proteinKcal;
    const fatG = Math.round(remainKcal * config.fatRatio / 9);
    const carbG = Math.round((remainKcal - fatG * 9) / 4);
    return { proteinG, fatG, carbG };
  }

  function calcMacros(trendWeightKg, targetByDay, config) {
    const macrosByDay = {};
    for (const d of DAY_KEYS) {
      macrosByDay[d] = calcMacrosForKcal(trendWeightKg, targetByDay[d], config);
    }
    return macrosByDay;
  }

  // トレンド体重・TDEE推定・目標・PFCを一括算出(M1の「今日」タブ即時計算、M2の週次計算の両方で使用)
  function computeEstimate(entries, config, todayDateStr, prevTdee) {
    const trendWeights = calcTrendWeights(entries, config.emaAlpha);
    const trendMap = trendMapFrom(trendWeights);
    const latestTrend = trendWeights.length ? trendWeights[trendWeights.length - 1].trendWeightKg : null;
    if (latestTrend == null) {
      return { trendWeights, trendMap, latestTrend: null, tdeeResult: null, targets: null, macrosByDay: null };
    }
    const windowStart = addDays(todayDateStr, -config.tdeeWindowDays + 1);
    const windowEntries = entries.filter(e => e.date >= windowStart && e.date <= todayDateStr);
    const tdeeResult = estimateTdee(windowEntries, trendMap, config, prevTdee);
    const targets = calcTargets(latestTrend, tdeeResult.tdee, config);
    const macrosByDay = calcMacros(latestTrend, targets.targetByDay, config);
    return { trendWeights, trendMap, latestTrend, tdeeResult, targets, macrosByDay };
  }

  // 週次プラン算出(設計書4.5節)。prevEntryがあれば前週のestimatedTdeeを引き継ぎクランプの基準にする
  function computeWeeklyPlan(entries, config, todayDateStr, prevEntry) {
    const weekStart = getWeekStart(todayDateStr);
    const prevTdee = prevEntry ? prevEntry.estimatedTdee : null;
    const est = computeEstimate(entries, config, todayDateStr, prevTdee);
    if (est.latestTrend == null) return null;

    const targetAvgKcal = Math.round(est.targets.targetAvgKcal);
    const targetMacros = calcMacrosForKcal(est.latestTrend, targetAvgKcal, config);

    return {
      weekStart,
      estimatedTdee: est.tdeeResult.tdee,
      targetAvgKcal,
      targetByDay: est.targets.targetByDay,
      trendWeightKg: est.latestTrend,
      targetMacros,
      tdeeGuarded: est.tdeeResult.guarded,
      tdeeRecordedDays: est.tdeeResult.recordedDays,
      overridden: false
    };
  }

  // ユーザーによる目標の手動上書き(オーバーライドフラグを保持)
  function applyManualOverride(weeklyEntry, manualTargetAvgKcal, config) {
    const targetByDay = {};
    for (const d of DAY_KEYS) {
      targetByDay[d] = Math.round(manualTargetAvgKcal * config.dayMultipliers[d] / 5) * 5;
    }
    const targetMacros = calcMacrosForKcal(weeklyEntry.trendWeightKg, manualTargetAvgKcal, config);
    return { ...weeklyEntry, targetAvgKcal: manualTargetAvgKcal, targetByDay, targetMacros, overridden: true };
  }

  // rows: {date, ...}[] 昇順。periodDaysが0/falsyなら全期間をそのまま返す
  function filterRowsByPeriod(rows, periodDays, todayDateStr) {
    if (!periodDays) return rows;
    const cutoff = addDays(todayDateStr, -periodDays + 1);
    return rows.filter(r => r.date >= cutoff);
  }

  // 直近4週の平均減量ペース(kg/週)と、現ペースでの目標到達予測日(設計書5.3節)
  function calcStatsSummary(trendWeights, goalWeightKg, todayDateStr) {
    if (trendWeights.length < 2) return { paceKgPerWeek: null, etaDate: null };

    const latest = trendWeights[trendWeights.length - 1];
    const cutoff = addDays(latest.date, -28);
    let refPoint = trendWeights[0];
    for (const t of trendWeights) {
      if (t.date <= cutoff) refPoint = t;
      else break;
    }
    const daysSpan = Math.max(1, daysBetween(refPoint.date, latest.date));
    if (daysSpan < 7) return { paceKgPerWeek: null, etaDate: null };

    const paceKgPerWeek = ((latest.trendWeightKg - refPoint.trendWeightKg) / daysSpan) * 7;

    let etaDate = null;
    if (paceKgPerWeek < -0.01 && latest.trendWeightKg > goalWeightKg) {
      const weeksToGoal = (latest.trendWeightKg - goalWeightKg) / Math.abs(paceKgPerWeek);
      etaDate = addDays(latest.date, Math.round(weeksToGoal * 7));
    }
    return { paceKgPerWeek, etaDate, refDate: refPoint.date, latestDate: latest.date };
  }

  // ============================================================
  // ストレージ層
  // ============================================================

  const STORAGE_KEYS = { config: 'wt_config', entries: 'wt_entries', weekly: 'wt_weekly' };
  let storageCorrupted = false;

  function loadJSON(key, fallback) {
    const raw = localStorage.getItem(key);
    if (raw == null) return fallback;
    try {
      return JSON.parse(raw);
    } catch (e) {
      console.warn('localStorage corrupted for key', key, e);
      storageCorrupted = true;
      return fallback;
    }
  }

  function saveJSON(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }

  function loadConfig() {
    const cfg = loadJSON(STORAGE_KEYS.config, null);
    if (cfg == null) {
      saveJSON(STORAGE_KEYS.config, DEFAULT_CONFIG);
      return { ...DEFAULT_CONFIG };
    }
    return { ...DEFAULT_CONFIG, ...cfg, dayMultipliers: { ...DEFAULT_CONFIG.dayMultipliers, ...(cfg.dayMultipliers || {}) } };
  }

  function loadEntries() {
    const entries = loadJSON(STORAGE_KEYS.entries, []);
    if (!Array.isArray(entries)) return [];
    entries.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
    return entries;
  }

  function loadWeekly() {
    const weekly = loadJSON(STORAGE_KEYS.weekly, []);
    return Array.isArray(weekly) ? weekly : [];
  }

  function saveConfig(cfg) { saveJSON(STORAGE_KEYS.config, cfg); }
  function saveEntries(entries) { saveJSON(STORAGE_KEYS.entries, entries); }
  function saveWeekly(weekly) { saveJSON(STORAGE_KEYS.weekly, weekly); }

  function upsertEntry(entries, date, patch) {
    const idx = entries.findIndex(e => e.date === date);
    if (idx === -1) {
      const base = { date, weightKg: null, intakeKcal: null, proteinG: null, fatG: null, carbG: null, note: '' };
      entries.push({ ...base, ...patch });
      entries.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
    } else {
      entries[idx] = { ...entries[idx], ...patch };
    }
    return entries;
  }

  function getEntry(entries, date) {
    return entries.find(e => e.date === date) || null;
  }

  // ============================================================
  // アプリ状態
  // ============================================================

  const state = {
    config: loadConfig(),
    entries: loadEntries(),
    weekly: loadWeekly(),
    currentWeekPlan: null,
  };
  let pendingWeeklyModal = null;

  // ============================================================
  // UI層
  // ============================================================

  const $ = (id) => document.getElementById(id);

  const LAST_EXPORT_KEY = 'wt_last_export';
  const BACKUP_REMINDER_DAYS = 30;

  function daysSinceLastExport() {
    const last = localStorage.getItem(LAST_EXPORT_KEY);
    if (!last) return Infinity;
    return daysBetween(last, todayStr());
  }

  function markExported() {
    localStorage.setItem(LAST_EXPORT_KEY, todayStr());
  }

  function showBanner() {
    const area = $('today-banner-area');
    area.innerHTML = '';
    if (storageCorrupted) {
      const b = document.createElement('div');
      b.className = 'banner warn';
      b.textContent = '保存データの一部が壊れていたため初期化しました。';
      area.appendChild(b);
    }
    if (state.currentWeekPlan && state.currentWeekPlan.trendWeightKg <= state.config.goalWeightKg) {
      const b = document.createElement('div');
      b.className = 'banner';
      b.textContent = '目標体重に到達しました。維持モード(週次ペース0%)への切替を検討してください。設定タブから変更できます。';
      area.appendChild(b);
    }
    if (daysSinceLastExport() >= BACKUP_REMINDER_DAYS) {
      const b = document.createElement('div');
      b.className = 'banner warn';
      b.textContent = 'バックアップ推奨: 設定タブからJSONエクスポートを行ってください。';
      area.appendChild(b);
    }
  }

  function renderBackupBanner() {
    const days = daysSinceLastExport();
    const card = $('backup-banner-card');
    if (days >= BACKUP_REMINDER_DAYS) {
      card.hidden = false;
      $('backup-banner-text').textContent = Number.isFinite(days)
        ? `最終バックアップから${days}日経過しています。エクスポートをおすすめします。`
        : 'まだバックアップを取っていません。エクスポートをおすすめします。';
    } else {
      card.hidden = true;
    }
  }

  // 当該週(state.currentWeekPlan.weekStart)分のwt_weeklyキャッシュを用意する。
  // 未計算なら新規算出してキャッシュし、前週データがあれば週次サマリモーダルを予約する。
  function ensureCurrentWeekPlan() {
    const today = todayStr();
    const weekStart = getWeekStart(today);
    const existing = state.weekly.find(w => w.weekStart === weekStart);
    if (existing) {
      state.currentWeekPlan = existing;
      return;
    }

    const prevWeekStart = addDays(weekStart, -7);
    const prevEntry = state.weekly.find(w => w.weekStart === prevWeekStart) || null;
    const newEntry = computeWeeklyPlan(state.entries, state.config, today, prevEntry);
    if (!newEntry) {
      state.currentWeekPlan = null;
      return;
    }

    state.weekly.push(newEntry);
    state.weekly.sort((a, b) => (a.weekStart < b.weekStart ? -1 : 1));
    saveWeekly(state.weekly);
    state.currentWeekPlan = newEntry;

    if (prevEntry) {
      pendingWeeklyModal = { newEntry, prevEntry };
    }
  }

  function showWeeklyModal(newEntry, prevEntry) {
    const sign = (n) => (n > 0 ? '+' : '') + n;
    const tdeeDiff = newEntry.estimatedTdee - prevEntry.estimatedTdee;
    const kcalDiff = newEntry.targetAvgKcal - prevEntry.targetAvgKcal;
    const trendDiff = Math.round((newEntry.trendWeightKg - prevEntry.trendWeightKg) * 10) / 10;
    $('weekly-modal-body').innerHTML = `
      <div class="modal-row"><span>推定TDEE</span><span>${prevEntry.estimatedTdee} → ${newEntry.estimatedTdee} kcal (${sign(tdeeDiff)})</span></div>
      <div class="modal-row"><span>目標kcal(平均)</span><span>${prevEntry.targetAvgKcal} → ${newEntry.targetAvgKcal} kcal (${sign(kcalDiff)})</span></div>
      <div class="modal-row"><span>トレンド体重</span><span>${prevEntry.trendWeightKg.toFixed(1)} → ${newEntry.trendWeightKg.toFixed(1)} kg (${sign(trendDiff)})</span></div>
    `;
    $('weekly-modal').hidden = false;
  }

  function renderTodayTab() {
    const today = todayStr();
    const dow = dayOfWeekKey(today);
    const d = parseDateStr(today);
    $('today-date-heading').textContent = `${d.getMonth() + 1}/${d.getDate()}(${DAY_LABELS_JA[dow]})`;

    const plan = state.currentWeekPlan;
    if (plan) {
      const kcal = plan.targetByDay[dow];
      const macrosByDay = calcMacros(plan.trendWeightKg, plan.targetByDay, state.config);
      const m = macrosByDay[dow];
      $('today-target-kcal').textContent = `${kcal} kcal`;
      $('today-target-macros').textContent = `P ${m.proteinG}g / F ${m.fatG}g / C ${m.carbG}g`;
      const guardNote = plan.tdeeGuarded ? '(データ不足のため初期値を使用中)' : '';
      const overrideNote = plan.overridden ? '(手動調整中)' : '';
      $('today-trend-line').textContent = `トレンド体重 ${plan.trendWeightKg.toFixed(1)} kg ${guardNote}${overrideNote}`;
      $('override-toggle-btn').hidden = false;
      $('override-kcal-input').value = plan.targetAvgKcal;
      $('override-reset-btn').hidden = !plan.overridden;
    } else {
      $('today-target-kcal').textContent = '--';
      $('today-target-macros').textContent = '体重を入力すると目標が表示されます';
      $('today-trend-line').textContent = '';
      $('override-toggle-btn').hidden = true;
      $('override-form').hidden = true;
    }

    renderRemaining(plan, today);

    const todayEntry = getEntry(state.entries, today);
    $('weight-input').value = (todayEntry && todayEntry.weightKg != null) ? todayEntry.weightKg : '';
    $('intake-kcal-input').value = (todayEntry && todayEntry.intakeKcal != null) ? todayEntry.intakeKcal : '';
    $('intake-protein-input').value = (todayEntry && todayEntry.proteinG != null) ? todayEntry.proteinG : '';
    $('intake-fat-input').value = (todayEntry && todayEntry.fatG != null) ? todayEntry.fatG : '';
    $('intake-carb-input').value = (todayEntry && todayEntry.carbG != null) ? todayEntry.carbG : '';

    showBanner();
  }

  // 週の目標合計(週次キャッシュのtargetByDay、週内固定)−実績合計を残日数で割って1日あたり可処分カロリーを算出
  function renderRemaining(plan, today) {
    if (!plan) {
      $('remaining-per-day').textContent = '--';
      $('remaining-detail').textContent = 'データ不足';
      return;
    }
    const weekDates = Array.from({ length: 7 }, (_, i) => addDays(plan.weekStart, i));
    let totalTarget = 0;
    let totalIntake = 0;
    let remainingDays = 0;
    for (const date of weekDates) {
      const dow = dayOfWeekKey(date);
      totalTarget += plan.targetByDay[dow];
      const e = getEntry(state.entries, date);
      if (e && e.intakeKcal != null) totalIntake += e.intakeKcal;
      if (date >= today) remainingDays++;
    }
    const remainingKcal = totalTarget - totalIntake;
    const perDay = remainingDays > 0 ? Math.round(remainingKcal / remainingDays) : remainingKcal;
    $('remaining-per-day').textContent = `1日あたり ${perDay.toLocaleString()} kcal`;
    $('remaining-detail').textContent = `あと${remainingDays}日 / 残り${remainingKcal.toLocaleString()}kcal`;
  }

  function handleWeightSave() {
    const raw = $('weight-input').value.trim();
    const errEl = $('weight-error');
    const msgEl = $('weight-saved-msg');
    errEl.textContent = '';
    msgEl.textContent = '';

    const val = parseFloat(raw);
    if (raw === '' || isNaN(val)) {
      errEl.textContent = '体重を入力してください。';
      return;
    }
    if (val < 40 || val > 150) {
      errEl.textContent = '体重は40〜150kgの範囲で入力してください。';
      return;
    }

    const today = todayStr();
    upsertEntry(state.entries, today, { weightKg: val });
    saveEntries(state.entries);
    msgEl.textContent = '保存しました。';
    ensureCurrentWeekPlan();
    renderTodayTab();
    flushPendingWeeklyModal();
  }

  function handleIntakeSave() {
    const kcalRaw = $('intake-kcal-input').value.trim();
    const pRaw = $('intake-protein-input').value.trim();
    const fRaw = $('intake-fat-input').value.trim();
    const cRaw = $('intake-carb-input').value.trim();
    const errEl = $('intake-error');
    const msgEl = $('intake-saved-msg');
    errEl.textContent = '';
    msgEl.textContent = '';

    const kcal = parseFloat(kcalRaw);
    if (kcalRaw === '' || isNaN(kcal)) {
      errEl.textContent = 'kcalを入力してください。';
      return;
    }

    const doSave = () => {
      const today = todayStr();
      const patch = { intakeKcal: Math.round(kcal) };
      if (pRaw !== '') patch.proteinG = Math.round(parseFloat(pRaw));
      if (fRaw !== '') patch.fatG = Math.round(parseFloat(fRaw));
      if (cRaw !== '') patch.carbG = Math.round(parseFloat(cRaw));
      upsertEntry(state.entries, today, patch);
      saveEntries(state.entries);
      msgEl.textContent = '保存しました。';
      renderTodayTab();
    };

    if (kcal < 500 || kcal > 5000) {
      if (confirm(`kcalが${kcal}です。500〜5000の通常範囲外ですが保存しますか？`)) {
        doSave();
      } else {
        errEl.textContent = '保存をキャンセルしました。';
      }
      return;
    }
    doSave();
  }

  function switchTab(name) {
    for (const tab of ['today', 'chart', 'settings']) {
      $(`tab-${tab}`).hidden = (tab !== name);
    }
    document.querySelectorAll('#tabbar button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === name);
    });
    if (name === 'chart') renderChartTab();
    if (name === 'settings') renderSettingsTab();
  }

  // ============================================================
  // グラフタブ(SVG自作)
  // ============================================================

  let currentChartPeriod = 30;

  function renderChartTab() {
    renderWeightChart(currentChartPeriod);
    renderTdeeChart();
    renderStatsSummary();
  }

  function renderWeightChart(periodDays) {
    const container = $('weight-chart-container');
    $('weight-chart-tooltip').textContent = '';
    const today = todayStr();
    const trendWeights = calcTrendWeights(state.entries, state.config.emaAlpha);
    const actualRows = state.entries
      .filter(e => e.weightKg != null)
      .map(e => ({ date: e.date, value: e.weightKg }));
    const trendRows = trendWeights.map(t => ({ date: t.date, value: t.trendWeightKg }));

    const filteredTrend = filterRowsByPeriod(trendRows, periodDays, today);
    const filteredActual = filterRowsByPeriod(actualRows, periodDays, today);

    if (filteredTrend.length === 0) {
      container.innerHTML = '<div class="chart-empty">体重データがありません</div>';
      return;
    }

    const minDate = filteredTrend[0].date;
    const maxDate = filteredTrend[filteredTrend.length - 1].date;
    const dateRange = Math.max(1, daysBetween(minDate, maxDate));

    const goal = state.config.goalWeightKg;
    const allValues = filteredTrend.map(r => r.value).concat(filteredActual.map(r => r.value)).concat([goal]);
    let minV = Math.min(...allValues);
    let maxV = Math.max(...allValues);
    if (minV === maxV) { minV -= 1; maxV += 1; }
    const pad = (maxV - minV) * 0.12;
    minV -= pad;
    maxV += pad;

    const W = 320, H = 190, marginL = 32, marginR = 8, marginT = 12, marginB = 20;
    const plotW = W - marginL - marginR;
    const plotH = H - marginT - marginB;
    const xOf = (dateStr) => marginL + (daysBetween(minDate, dateStr) / dateRange) * plotW;
    const yOf = (v) => marginT + (1 - (v - minV) / (maxV - minV)) * plotH;

    const trendPath = filteredTrend
      .map((r, i) => `${i === 0 ? 'M' : 'L'} ${xOf(r.date).toFixed(1)} ${yOf(r.value).toFixed(1)}`)
      .join(' ');
    const actualDots = filteredActual
      .map(r => `<circle cx="${xOf(r.date).toFixed(1)}" cy="${yOf(r.value).toFixed(1)}" r="2.3" fill="var(--text-sub)" opacity="0.6"></circle>`)
      .join('');
    const goalY = yOf(goal);
    const goalLine = (goal >= minV && goal <= maxV)
      ? `<line x1="${marginL}" y1="${goalY.toFixed(1)}" x2="${W - marginR}" y2="${goalY.toFixed(1)}" stroke="var(--success)" stroke-width="1" stroke-dasharray="4 3"></line>`
      : '';

    const dMin = parseDateStr(minDate), dMax = parseDateStr(maxDate);
    const xMinLabel = `${dMin.getMonth() + 1}/${dMin.getDate()}`;
    const xMaxLabel = `${dMax.getMonth() + 1}/${dMax.getDate()}`;

    container.innerHTML = `
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        ${goalLine}
        ${actualDots}
        <path d="${trendPath}" fill="none" stroke="var(--accent)" stroke-width="2"></path>
        <text x="2" y="${marginT + 8}" font-size="9" fill="var(--text-sub)">${maxV.toFixed(1)}</text>
        <text x="2" y="${H - marginB + 4}" font-size="9" fill="var(--text-sub)">${minV.toFixed(1)}</text>
        <text x="${marginL}" y="${H - 4}" font-size="9" fill="var(--text-sub)" text-anchor="start">${xMinLabel}</text>
        <text x="${W - marginR}" y="${H - 4}" font-size="9" fill="var(--text-sub)" text-anchor="end">${xMaxLabel}</text>
        <rect x="${marginL}" y="${marginT}" width="${plotW}" height="${plotH}" fill="transparent" id="weight-chart-hit"></rect>
      </svg>
    `;

    const svgEl = container.querySelector('svg');
    svgEl.addEventListener('click', (evt) => {
      const rect = svgEl.getBoundingClientRect();
      const xPix = (evt.clientX - rect.left) * (W / rect.width);
      const ratio = clamp((xPix - marginL) / plotW, 0, 1);
      const targetDate = addDays(minDate, Math.round(ratio * dateRange));
      let closest = filteredTrend[0];
      let bestDiff = Infinity;
      for (const r of filteredTrend) {
        const diff = Math.abs(daysBetween(r.date, targetDate));
        if (diff < bestDiff) { bestDiff = diff; closest = r; }
      }
      $('weight-chart-tooltip').textContent = `${closest.date}: トレンド ${closest.value.toFixed(1)} kg`;
    });
  }

  function renderTdeeChart() {
    const container = $('tdee-chart-container');
    const weekly = state.weekly.slice().sort((a, b) => (a.weekStart < b.weekStart ? -1 : 1)).slice(-12);
    if (weekly.length === 0) {
      container.innerHTML = '<div class="chart-empty">週次データがありません</div>';
      return;
    }

    const W = 320, H = 150, marginL = 32, marginR = 8, marginT = 12, marginB = 20;
    const plotW = W - marginL - marginR;
    const plotH = H - marginT - marginB;
    const values = weekly.map(w => w.estimatedTdee);
    let minV = Math.min(...values);
    let maxV = Math.max(...values);
    if (minV === maxV) { minV -= 100; maxV += 100; }
    const pad = (maxV - minV) * 0.15;
    minV = Math.max(0, minV - pad);
    maxV += pad;

    const slot = plotW / weekly.length;
    const barW = slot * 0.6;
    const bars = weekly.map((w, i) => {
      const cx = marginL + slot * i + slot / 2;
      const y = marginT + (1 - (w.estimatedTdee - minV) / (maxV - minV)) * plotH;
      const barH = (marginT + plotH) - y;
      return `<rect x="${(cx - barW / 2).toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0, barH).toFixed(1)}" rx="2" fill="var(--accent)"></rect>`;
    }).join('');

    const dFirst = parseDateStr(weekly[0].weekStart);
    const dLast = parseDateStr(weekly[weekly.length - 1].weekStart);

    container.innerHTML = `
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        ${bars}
        <text x="2" y="${marginT + 8}" font-size="9" fill="var(--text-sub)">${Math.round(maxV)}</text>
        <text x="2" y="${H - marginB + 4}" font-size="9" fill="var(--text-sub)">${Math.round(minV)}</text>
        <text x="${marginL}" y="${H - 4}" font-size="9" fill="var(--text-sub)" text-anchor="start">${dFirst.getMonth() + 1}/${dFirst.getDate()}</text>
        <text x="${W - marginR}" y="${H - 4}" font-size="9" fill="var(--text-sub)" text-anchor="end">${dLast.getMonth() + 1}/${dLast.getDate()}</text>
      </svg>
    `;
  }

  function renderStatsSummary() {
    const trendWeights = calcTrendWeights(state.entries, state.config.emaAlpha);
    const stats = calcStatsSummary(trendWeights, state.config.goalWeightKg, todayStr());
    if (stats.paceKgPerWeek == null) {
      $('stat-pace').textContent = '--';
      $('stat-eta').textContent = '--';
      return;
    }
    const pace = Math.round(stats.paceKgPerWeek * 100) / 100;
    $('stat-pace').textContent = `${pace > 0 ? '+' : ''}${pace.toFixed(2)} kg/週`;
    if (stats.etaDate) {
      const d = parseDateStr(stats.etaDate);
      $('stat-eta').textContent = `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
    } else {
      $('stat-eta').textContent = '予測不可';
    }
  }

  // ============================================================
  // 設定タブ
  // ============================================================

  function renderSettingsTab() {
    const c = state.config;
    $('cfg-goal-weight').value = c.goalWeightKg;
    $('cfg-loss-rate').value = c.weeklyLossRatePct;
    $('cfg-protein-per-kg').value = c.proteinPerKg;
    $('cfg-fat-ratio').value = c.fatRatio;
    for (const d of DAY_KEYS) $(`cfg-dm-${d}`).value = c.dayMultipliers[d];
    renderBackupBanner();
  }

  function handleConfigSave() {
    const msgEl = $('cfg-saved-msg');
    msgEl.textContent = '';

    const goalWeightKg = parseFloat($('cfg-goal-weight').value);
    const weeklyLossRatePct = parseFloat($('cfg-loss-rate').value);
    const proteinPerKg = parseFloat($('cfg-protein-per-kg').value);
    const fatRatio = parseFloat($('cfg-fat-ratio').value);
    if ([goalWeightKg, weeklyLossRatePct, proteinPerKg, fatRatio].some(v => isNaN(v))) {
      alert('数値を正しく入力してください。');
      return;
    }

    const dayMultipliers = {};
    for (const d of DAY_KEYS) {
      const v = parseFloat($(`cfg-dm-${d}`).value);
      if (isNaN(v) || v <= 0) {
        alert('曜日別配分は正の数で入力してください。');
        return;
      }
      dayMultipliers[d] = v;
    }

    state.config = { ...state.config, goalWeightKg, weeklyLossRatePct, proteinPerKg, fatRatio, dayMultipliers };
    saveConfig(state.config);
    msgEl.textContent = '保存しました。次回の週次見直しから反映されます(今週の目標は「目標を手動調整」で即時変更できます)。';
    renderTodayTab();
  }

  function buildBackupPayload() {
    return { wt_config: state.config, wt_entries: state.entries, wt_weekly: state.weekly };
  }

  async function handleExportClipboard() {
    const json = JSON.stringify(buildBackupPayload(), null, 2);
    const msgEl = $('export-msg');
    try {
      await navigator.clipboard.writeText(json);
      msgEl.textContent = 'クリップボードにコピーしました。';
    } catch (e) {
      msgEl.textContent = 'コピーに失敗しました。ファイルダウンロードをご利用ください。';
    }
    markExported();
    renderBackupBanner();
  }

  function handleExportDownload() {
    const json = JSON.stringify(buildBackupPayload(), null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `weight-tracker-backup-${todayStr().replace(/-/g, '')}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    $('export-msg').textContent = 'ファイルをダウンロードしました。';
    markExported();
    renderBackupBanner();
  }

  function validateBackupPayload(obj) {
    return !!obj && typeof obj === 'object'
      && obj.wt_config && typeof obj.wt_config === 'object'
      && Array.isArray(obj.wt_entries)
      && Array.isArray(obj.wt_weekly);
  }

  function handleImport() {
    const raw = $('import-textarea').value.trim();
    const errEl = $('import-error');
    const msgEl = $('import-msg');
    errEl.textContent = '';
    msgEl.textContent = '';

    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (e) {
      errEl.textContent = 'JSONの形式が正しくありません。';
      return;
    }
    if (!validateBackupPayload(parsed)) {
      errEl.textContent = 'バックアップデータの形式が正しくありません(wt_config/wt_entries/wt_weeklyが必要です)。';
      return;
    }
    if (!confirm('現在のデータを上書きしてインポートします。よろしいですか?')) {
      return;
    }

    state.config = {
      ...DEFAULT_CONFIG,
      ...parsed.wt_config,
      dayMultipliers: { ...DEFAULT_CONFIG.dayMultipliers, ...(parsed.wt_config.dayMultipliers || {}) }
    };
    state.entries = parsed.wt_entries.slice().sort((a, b) => (a.date < b.date ? -1 : 1));
    state.weekly = parsed.wt_weekly.slice().sort((a, b) => (a.weekStart < b.weekStart ? -1 : 1));
    saveConfig(state.config);
    saveEntries(state.entries);
    saveWeekly(state.weekly);

    $('import-textarea').value = '';
    msgEl.textContent = '復元しました。';
    ensureCurrentWeekPlan();
    renderTodayTab();
    renderSettingsTab();
    renderChartTab();
  }

  function handleDeleteAll() {
    if (!confirm('本当にすべてのデータを削除しますか？この操作は取り消せません。')) return;
    if (!confirm('最終確認: 体重・摂取記録・週次計算結果・設定がすべて削除されます。実行しますか？')) return;
    localStorage.removeItem(STORAGE_KEYS.config);
    localStorage.removeItem(STORAGE_KEYS.entries);
    localStorage.removeItem(STORAGE_KEYS.weekly);
    localStorage.removeItem(LAST_EXPORT_KEY);
    location.reload();
  }

  function flushPendingWeeklyModal() {
    if (pendingWeeklyModal) {
      showWeeklyModal(pendingWeeklyModal.newEntry, pendingWeeklyModal.prevEntry);
      pendingWeeklyModal = null;
    }
  }

  function handleOverrideSave() {
    const val = parseInt($('override-kcal-input').value, 10);
    if (isNaN(val) || val < 1000 || val > 5000) {
      alert('週の目標平均kcalは1000〜5000の範囲で入力してください。');
      return;
    }
    const idx = state.weekly.findIndex(w => w.weekStart === state.currentWeekPlan.weekStart);
    const updated = applyManualOverride(state.currentWeekPlan, val, state.config);
    state.weekly[idx] = updated;
    state.currentWeekPlan = updated;
    saveWeekly(state.weekly);
    $('override-form').hidden = true;
    renderTodayTab();
  }

  function handleOverrideReset() {
    const idx = state.weekly.findIndex(w => w.weekStart === state.currentWeekPlan.weekStart);
    const prevWeekStart = addDays(state.currentWeekPlan.weekStart, -7);
    const prevEntry = state.weekly.find(w => w.weekStart === prevWeekStart) || null;
    const recomputed = computeWeeklyPlan(state.entries, state.config, todayStr(), prevEntry);
    state.weekly[idx] = recomputed;
    state.currentWeekPlan = recomputed;
    saveWeekly(state.weekly);
    $('override-form').hidden = true;
    renderTodayTab();
  }

  function init() {
    $('weight-save-btn').addEventListener('click', handleWeightSave);
    $('intake-save-btn').addEventListener('click', handleIntakeSave);
    document.querySelectorAll('#tabbar button').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    $('weekly-modal-close').addEventListener('click', () => { $('weekly-modal').hidden = true; });
    $('override-toggle-btn').addEventListener('click', () => {
      $('override-form').hidden = !$('override-form').hidden;
    });
    $('override-cancel-btn').addEventListener('click', () => { $('override-form').hidden = true; });
    $('override-save-btn').addEventListener('click', handleOverrideSave);
    $('override-reset-btn').addEventListener('click', handleOverrideReset);

    document.querySelectorAll('#weight-period-switch button').forEach(btn => {
      btn.addEventListener('click', () => {
        currentChartPeriod = parseInt(btn.dataset.period, 10);
        document.querySelectorAll('#weight-period-switch button').forEach(b => b.classList.toggle('active', b === btn));
        renderWeightChart(currentChartPeriod);
      });
    });

    $('cfg-save-btn').addEventListener('click', handleConfigSave);
    $('export-clipboard-btn').addEventListener('click', handleExportClipboard);
    $('export-download-btn').addEventListener('click', handleExportDownload);
    $('import-btn').addEventListener('click', handleImport);
    $('delete-all-btn').addEventListener('click', handleDeleteAll);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW registration failed', e));
      });
    }

    ensureCurrentWeekPlan();
    renderTodayTab();
    flushPendingWeeklyModal();
  }

  // 開発用テストデータ投入(コンソールから wtDevSeed() で実行)
  window.wtDevSeed = function (days = 21) {
    const today = todayStr();
    const entries = [];
    let w = 79.0;
    for (let i = days - 1; i >= 0; i--) {
      const date = addDays(today, -i);
      w -= 0.03 + Math.random() * 0.02;
      const intake = Math.round(1850 + (Math.random() * 200 - 100));
      entries.push({
        date,
        weightKg: Math.round(w * 10) / 10,
        intakeKcal: intake,
        proteinG: Math.round(intake * 0.25 / 4),
        fatG: Math.round(intake * 0.3 / 9),
        carbG: Math.round(intake * 0.45 / 4),
        note: ''
      });
    }
    state.entries = entries;
    saveEntries(entries);
    state.weekly = [];
    saveWeekly(state.weekly);
    ensureCurrentWeekPlan();
    renderTodayTab();
    flushPendingWeeklyModal();
    console.log(`Seeded ${days} days of test data.`);
  };

  window.wtDevClear = function () {
    localStorage.removeItem(STORAGE_KEYS.entries);
    localStorage.removeItem(STORAGE_KEYS.weekly);
    location.reload();
  };

  // テスト用にアルゴリズム関数をエクスポート
  window.wtAlgo = {
    calcTrendWeights, estimateTdee, calcTargets, calcMacros, calcMacrosForKcal,
    computeEstimate, computeWeeklyPlan, applyManualOverride,
    filterRowsByPeriod, calcStatsSummary,
    getWeekStart, dayOfWeekKey, addDays, daysBetween, todayStr
  };

  init();
})();
</script>
</body>
</html>
